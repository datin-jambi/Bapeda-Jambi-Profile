services:
  app-production:
    build:
      context: .
      dockerfile: Dockerfile
    image: bapeda-profile:production
    container_name: bapeda-profile-prod
    restart: unless-stopped
    ports:
      - "3031:3000"
    env_file:
      - .env.production
    networks:
      - production-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  production-network:
    name: production-network
    driver: bridge
