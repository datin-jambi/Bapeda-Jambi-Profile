services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: bapenda-jambi-local
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    volumes:
      # Mount source for hot reload (excludes node_modules to avoid host corruption)
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - local-network

  db:
    image: postgres:16-alpine
    container_name: bapenda-jambi-db-local
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bapenda_jambi
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    networks:
      - local-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_local_data:

networks:
  local-network:
    name: local-network
    driver: bridge
