services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.local
    image: bapeda-profile:development
    container_name: bapeda-profile-dev
    restart: unless-stopped
    ports:
      - "3033:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/bapenda_jambi
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - local-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: postgres:16-alpine
    container_name: bapeda-profile-db-dev
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bapenda_jambi
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    networks:
      - local-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_local_data:

networks:
  local-network:
    name: local-network
    driver: bridge
